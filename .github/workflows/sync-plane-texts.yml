name: Sync Plane Oracle Texts from MTGJSON

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (report mismatches without committing)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: claude/planechase-app-migration-7ejfvc

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test MTGJSON connectivity
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://mtgjson.com/api/v5/OHOP.json")
          echo "MTGJSON HTTP status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "ERROR: Cannot reach MTGJSON API (status $STATUS)"
            exit 1
          fi

      - name: Run MTGJSON fix script
        run: node scripts/fix-planes-from-scryfall.mjs

      - name: Show diff
        run: git diff src/data/planes.js || true

      - name: Commit and push corrections
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet src/data/planes.js; then
            echo "No changes to commit."
          else
            git add src/data/planes.js
            git commit -m "Auto-fix plane oracle texts via Scryfall API"
            git push origin claude/planechase-app-migration-7ejfvc
          fi
